<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тренажер тональностей</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { --bg: #1a1a1d; --panel: #25252b; --text: #efefef; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; touch-action: manipulation; }
        
        /* Мобильная панель настроек */
        #settings-bar { width: 100%; background: var(--panel); padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .group { display: flex; gap: 5px; align-items: center; font-size: 0.8rem; }
        
        #main-area { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        #notation-container { background: white; border-radius: 8px; margin-bottom: 20px; }
        
        #circle-container { position: relative; width: 300px; height: 300px; }
        .key-btn { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: #333; color: white; border: 1px solid #555; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); -webkit-tap-highlight-color: transparent; }
        .key-btn:active { transform: translate(-50%, -50%) scale(0.9); }
        .correct { background: #2e7d32 !important; }
        .wrong { background: #c62828 !important; }
    </style>
</head>
<body>

<div id="settings-bar">
    <div class="group">
        <select id="mode" onchange="updateSettings()">
            <option value="major">Мажор</option>
            <option value="minor">Минор</option>
        </select>
        <select id="system" onchange="updateSettings()">
            <option value="english">Англ</option>
            <option value="german">Нем</option>
            <option value="russian">Рус</option>
        </select>
    </div>
</div>

<div id="main-area">
    <div id="score-board" style="margin-bottom: 10px;">Счет: 0</div>
    <div id="notation-container"></div>
    <div id="circle-container"></div>
</div>

<script>
    const { Renderer, Stave } = Vex.Flow;
    const keys = [
        { id: 'C', spec: 'C', names: { english: { major: 'C', minor: 'a' }, german: { major: 'C', minor: 'a' }, russian: { major: 'До', minor: 'ля' } } },
        { id: 'G', spec: 'G', names: { english: { major: 'G', minor: 'e' }, german: { major: 'G', minor: 'e' }, russian: { major: 'Соль', minor: 'ми' } } },
        { id: 'D', spec: 'D', names: { english: { major: 'D', minor: 'b' }, german: { major: 'D', minor: 'h' }, russian: { major: 'Ре', minor: 'си' } } },
        { id: 'A', spec: 'A', names: { english: { major: 'A', minor: 'f#' }, german: { major: 'A', minor: 'fis' }, russian: { major: 'Ля', minor: 'фа#' } } },
        { id: 'E', spec: 'E', names: { english: { major: 'E', minor: 'c#' }, german: { major: 'E', minor: 'cis' }, russian: { major: 'Ми', minor: 'до#' } } },
        { id: 'B', spec: 'B', names: { english: { major: 'B', minor: 'g#' }, german: { major: 'H', minor: 'gis' }, russian: { major: 'Си', minor: 'соль#' } } },
        { id: 'F#', spec: 'F#', names: { english: 'F#', german: 'Fis', russian: 'Фа#' }, minor: { english: 'd#', german: 'dis', russian: 'ре#' } },
        { id: 'C#', spec: 'C#', names: { english: 'C#', german: 'Cis', russian: 'До#' }, minor: { english: 'a#', german: 'ais', russian: 'ля#' } },
        { id: 'Cb', spec: 'Cb', names: { english: 'Cb', german: 'Ces', russian: 'Доb' }, minor: { english: 'ab', german: 'as', russian: 'ляb' } },
        { id: 'Gb', spec: 'Gb', names: { english: 'Gb', german: 'Ges', russian: 'Сольb' }, minor: { english: 'eb', german: 'es', russian: 'миb' } },
        { id: 'Db', spec: 'Db', names: { english: 'Db', german: 'Des', russian: 'Реb' }, minor: { english: 'bb', german: 'b', russian: 'сиb' } },
        { id: 'Ab', spec: 'Ab', names: { english: 'Ab', german: 'As', russian: 'Ляb' }, minor: { english: 'f', german: 'f', russian: 'фа' } },
        { id: 'Eb', spec: 'Eb', names: { english: 'Eb', german: 'Es', russian: 'Миb' }, minor: { english: 'c', german: 'c', russian: 'до' } },
        { id: 'Bb', spec: 'Bb', names: { english: 'Bb', german: 'B', russian: 'Сиb' }, minor: { english: 'g', german: 'g', russian: 'соль' } },
        { id: 'F', spec: 'F', names: { english: 'F', german: 'F', russian: 'Фа' }, minor: { english: 'd', german: 'd', russian: 'ре' } }
    ];
    
    // Исправление структуры для лаконичности
    const fixedKeys = keys.map(k => ({
        ...k,
        getName: (sys, mod) => mod === 'major' ? k.names[sys].major : k.names[sys].minor
    }));

    let currentKey, score = 0;
    let buttons = [];

    function updateSettings() {
        buttons.forEach(b => {
            const sys = document.getElementById('system').value;
            const mod = document.getElementById('mode').value;
            b.btn.innerText = b.data.getName(sys, mod);
        });
    }

    function renderNotation(spec) {
        const div = document.getElementById('notation-container');
        div.innerHTML = '';
        const renderer = new Renderer(div, Renderer.Backends.SVG);
        renderer.resize(160, 100);
        const stave = new Stave(10, 0, 140);
        stave.addClef("treble").addKeySignature(spec).setContext(renderer.getContext()).draw();
    }

    function buildCircle() {
        const cont = document.getElementById('circle-container');
        fixedKeys.forEach((k, i) => {
            const btn = document.createElement('div');
            btn.className = 'key-btn';
            const rad = ((i * 24 - 90) * Math.PI) / 180;
            btn.style.left = (50 + Math.cos(rad) * 40) + '%';
            btn.style.top = (50 + Math.sin(rad) * 40) + '%';
            btn.onclick = () => {
                if(k.id === currentKey.id) {
                    btn.classList.add('correct');
                    score++;
                    document.getElementById('score-board').innerText = 'Счет: ' + score;
                    setTimeout(next, 500);
                } else {
                    btn.classList.add('wrong');
                    score = 0;
                    setTimeout(() => btn.classList.remove('wrong'), 300);
                }
            };
            cont.appendChild(btn);
            buttons.push({btn, data: k});
        });
    }

    function next() {
        buttons.forEach(b => b.btn.classList.remove('correct', 'wrong'));
        currentKey = fixedKeys[Math.floor(Math.random() * fixedKeys.length)];
        renderNotation(currentKey.spec);
    }

    buildCircle();
    updateSettings();
    next();
</script>
</body>
</html>
