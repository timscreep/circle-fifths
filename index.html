<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">

<title>Тренажер тональностей</title>

<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>

<style>

:root{
--bg:#1a1a1d;
--panel:#25252b;
--accent:#ffca28;
--good:#2e7d32;
--bad:#c62828;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

margin:0;
background:var(--bg);
color:#eee;

font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;

height:100vh;
overflow:hidden;

display:flex;
flex-direction:column;

padding-bottom:env(safe-area-inset-bottom);

}

/* HEADER */

#topbar{

height:50px;
display:flex;
align-items:center;
justify-content:space-between;

padding:0 14px;

}

#settingsBtn{

font-size:22px;
cursor:pointer;

}

/* MAIN */

#main-area{

flex:1;

display:flex;
flex-direction:column;

align-items:center;
justify-content:space-between;

padding:12px;

}

#score-board{

font-size:1.3rem;
font-weight:bold;
color:#81c784;

}

/* NOTATION */

#notation-container{

background:white;

border-radius:12px;

width:92vw;
max-width:340px;

height:120px;

display:flex;
align-items:center;
justify-content:center;

box-shadow:0 6px 20px rgba(0,0,0,0.4);

}

/* CIRCLE */

#circle-wrapper{

position:relative;

width:min(92vw,75vh);
height:min(92vw,75vh);

max-width:440px;
max-height:440px;

}

#circle-container{

position:absolute;
width:100%;
height:100%;

}

/* BUTTONS */

.key-btn{

position:absolute;

width:74px;
height:74px;

border-radius:50%;

background:#33333d;
color:white;

border:2px solid #444;

font-weight:bold;

display:flex;
align-items:center;
justify-content:center;

font-size:.95rem;

transform:translate(-50%,-50%);

touch-action:manipulation;

transition:.08s;

}

.key-btn:active{
transform:translate(-50%,-50%) scale(.9);
}

.correct{
background:var(--good)!important;
border-color:#a5d6a7!important;
}

.wrong{
background:var(--bad)!important;
border-color:#ef9a9a!important;
}

/* SETTINGS DRAWER */

#drawer{

position:fixed;

bottom:-260px;
left:0;

width:100%;

background:var(--panel);

border-radius:16px 16px 0 0;

padding:20px;

transition:.3s;

box-shadow:0 -10px 30px rgba(0,0,0,.5);

}

#drawer.open{
bottom:0;
}

.drawer-handle{

width:40px;
height:4px;

background:#666;

border-radius:2px;

margin:0 auto 14px auto;

}

.setting-group{

margin-bottom:16px;

display:flex;
flex-direction:column;

gap:4px;

}

.setting-group strong{

font-size:.7rem;
color:var(--accent);

text-transform:uppercase;

}

select{

background:#333;
color:white;

border:1px solid #555;
border-radius:6px;

padding:6px;

font-size:.9rem;

}

/* DESKTOP */

@media(min-width:768px){

#drawer{

bottom:0;
right:auto;

width:240px;
height:100%;

border-radius:0;

}

#drawer.open{
bottom:0;
}

body{
flex-direction:row;
}

#main-area{
flex:1;
}

}

</style>
</head>

<body>

<div id="topbar">

<div id="score-board">Счет: 0</div>

<div id="settingsBtn">⚙</div>

</div>

<div id="main-area">

<div id="notation-container"></div>

<div id="circle-wrapper">
<div id="circle-container"></div>
</div>

</div>

<div id="drawer">

<div class="drawer-handle"></div>

<div class="setting-group">
<strong>Система</strong>
<select id="system-select" onchange="updateSettings()">
<option value="english">Английская</option>
<option value="german">Немецкая</option>
<option value="russian">Русская</option>
</select>
</div>

<div class="setting-group">
<strong>Лад</strong>
<select id="mode-select" onchange="updateSettings()">
<option value="major">Мажор</option>
<option value="minor">Минор</option>
</select>
</div>

</div>

<script>

const {Renderer,Stave}=Vex.Flow

const keys=[

{ id:'C',spec:'C',names:{english:{major:'C',minor:'a'},german:{major:'C',minor:'a'},russian:{major:'До',minor:'ля'}}},
{ id:'G',spec:'G',names:{english:{major:'G',minor:'e'},german:{major:'G',minor:'e'},russian:{major:'Соль',minor:'ми'}}},
{ id:'D',spec:'D',names:{english:{major:'D',minor:'b'},german:{major:'D',minor:'h'},russian:{major:'Ре',minor:'си'}}},
{ id:'A',spec:'A',names:{english:{major:'A',minor:'f#'},german:{major:'A',minor:'fis'},russian:{major:'Ля',minor:'фа#'}}},
{ id:'E',spec:'E',names:{english:{major:'E',minor:'c#'},german:{major:'E',minor:'cis'},russian:{major:'Ми',minor:'до#'}}},
{ id:'B',spec:'B',names:{english:{major:'B',minor:'g#'},german:{major:'H',minor:'gis'},russian:{major:'Си',minor:'соль#'}}},
{ id:'F#',spec:'F#',names:{english:{major:'F#',minor:'d#'},german:{major:'Fis',minor:'dis'},russian:{major:'Фа#',minor:'ре#'}}},
{ id:'C#',spec:'C#',names:{english:{major:'C#',minor:'a#'},german:{major:'Cis',minor:'ais'},russian:{major:'До#',minor:'ля#'}}},
{ id:'Cb',spec:'Cb',names:{english:{major:'Cb',minor:'ab'},german:{major:'Ces',minor:'as'},russian:{major:'Доb',minor:'ляb'}}},
{ id:'Gb',spec:'Gb',names:{english:{major:'Gb',minor:'eb'},german:{major:'Ges',minor:'es'},russian:{major:'Сольb',minor:'миb'}}},
{ id:'Db',spec:'Db',names:{english:{major:'Db',minor:'bb'},german:{major:'Des',minor:'b'},russian:{major:'Реb',minor:'сиb'}}},
{ id:'Ab',spec:'Ab',names:{english:{major:'Ab',minor:'f'},german:{major:'As',minor:'f'},russian:{major:'Ляb',minor:'фа'}}},
{ id:'Eb',spec:'Eb',names:{english:{major:'Eb',minor:'c'},german:{major:'Es',minor:'c'},russian:{major:'Миb',minor:'до'}}},
{ id:'Bb',spec:'Bb',names:{english:{major:'Bb',minor:'g'},german:{major:'B',minor:'g'},russian:{major:'Сиb',minor:'соль'}}},
{ id:'F',spec:'F',names:{english:{major:'F',minor:'d'},german:{major:'F',minor:'d'},russian:{major:'Фа',minor:'ре'}}}

]

let currentKey
let score=0
let waiting=false
let buttons=[]

function renderNotation(key){

const container=document.getElementById("notation-container")
container.innerHTML=""

const w=container.clientWidth

const renderer=new Renderer(container,Renderer.Backends.SVG)
renderer.resize(w,120)

const context=renderer.getContext()

const stave=new Stave(10,10,w-20)

stave.addClef("treble").addKeySignature(key)

stave.setContext(context).draw()

}

function updateSettings(){

const mode=document.getElementById("mode-select").value
const system=document.getElementById("system-select").value

buttons.forEach(b=>{
b.btn.innerText=b.keyData.names[system][mode]
})

}

function buildCircle(){

const container=document.getElementById("circle-container")

keys.forEach((keyData,i)=>{

const btn=document.createElement("div")
btn.className="key-btn"

const angle=(i*(360/15))-90
const rad=angle*Math.PI/180

btn.style.left=(50+Math.cos(rad)*42)+"%"
btn.style.top=(50+Math.sin(rad)*42)+"%"

btn.onclick=()=>{

if(waiting)return

if(keyData.id===currentKey.id){

btn.classList.add("correct")
score++
waiting=true

setTimeout(nextQuestion,500)

}else{

btn.classList.add("wrong")
score=0

setTimeout(()=>btn.classList.remove("wrong"),400)

}

document.getElementById("score-board").innerText="Счет: "+score

}

container.appendChild(btn)

buttons.push({btn,keyData})

})

}

function nextQuestion(){

waiting=false

buttons.forEach(b=>b.btn.classList.remove("correct","wrong"))

currentKey=keys[Math.floor(Math.random()*keys.length)]

renderNotation(currentKey.spec)

}

/* drawer */

const drawer=document.getElementById("drawer")

document.getElementById("settingsBtn").onclick=()=>{
drawer.classList.toggle("open")
}

buildCircle()
updateSettings()
nextQuestion()

</script>

</body>
</html>
